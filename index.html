<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретный бункер хорошего настроения! ✨</title>
    <style>
        :root {
            --bg-color: #f7f1eb;
            --card-color: #ffffff;
            --accent-color: #ff7b91;
            --accent-hover: #ff526f;
            --secondary-color: #7bc9ff;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-color);
            padding: 30px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            font-size: 26px;
            margin-bottom: 5px;
            margin-top: 0;
        }

        .subtitle {
            font-size: 15px;
            color: #777;
            margin-bottom: 25px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 400px) {
            .grid-buttons {
                grid-template-columns: 1fr;
            }
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 15px;
            font-size: 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(255, 123, 145, 0.2);
        }

        button.blue-btn {
            background-color: var(--secondary-color);
            box-shadow: 0 4px 10px rgba(123, 201, 255, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        button:active {
            transform: translateY(1px);
        }

        #output-box {
            min-height: 70px;
            padding: 20px;
            border: 2px dashed #ffd3da;
            background-color: #fffafb;
            border-radius: 18px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 16px;
            line-height: 1.5;
        }

        .animal-pic {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Зона интерактива */
        .interactive-zone {
            margin-top: 25px;
            border-top: 2px dashed #f0f0f0;
            padding-top: 20px;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .sad-emoji {
            font-size: 50px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s ease;
            user-select: none;
            margin: 10px 0;
        }

        .sad-emoji:hover {
            transform: scale(1.1);
        }

        .counter-text {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
        
        #secret-message {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: bold;
            height: 18px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Эй, прекрасная леди! 🌸</h1>
        <div class="subtitle">Этот сайт создан повышать тебе настроение. Тыкай на любые кнопки!</div>

        <div class="grid-buttons">
            <button onclick="getCompliment()">✨ Поддержка</button>
            <button onclick="getHug()">☕ Обнимашка</button>
            <button class="blue-btn" onclick="getPrediction()">🥠 Предсказание</button>
            <button class="blue-btn" onclick="getIdea()">🎉 Идея на вечер</button>
        </div>
        
        <button style="width: 100%; background: #64dfdf; color: #114e4e; box-shadow: none;" onclick="getAnimal()">🐱 Призвать пушистого антидепрессанта</button>

        <div id="output-box">
            <span id="output-text">Нажми на кнопочки выше, чтобы запустить магию... 😉</span>
            <img id="animal-img" class="animal-pic" src="" alt="Милое животное">
        </div>

        <div class="interactive-zone">
            <div class="game-title">🔨 Уничтожитель грусти 3000</div>
            <div style="font-size: 13px; color: #666;">Кликай на смайлик, чтобы прогнать тоску!</div>
            <div id="emoji" class="sad-emoji" onclick="popSadness()">😢</div>
            <div id="secret-message"></div>
            <div class="counter-text">Грусти уничтожено: <span id="click-count" style="font-weight:bold; color: var(--accent-color);">0</span> раз(а)</div>
        </div>
    </div>
